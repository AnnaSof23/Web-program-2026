<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h3>В масиві з 12 елементів задано дохід за кожний з 12 місяців, знайти дохід за літні місяці.
    </h3>
    <p id="arr_out"></p>

    <p id="result"></p>
    <script>
        let arr_out = document.getElementById("arr_out");
        let result = document.getElementById("result");
        let arr = [];
        let str_out = "<b>Досліджуваний масив:</b> ";
        for (let i = 0; i < 12; i += 1) {
            arr.push(Math.floor(Math.random() * 10000) + 1000);
            str_out += arr[i] + " "
        }
        console.log(arr);
        arr_out.innerHTML = str_out;

        let summer = arr[5] + arr[6] + arr[7];

        result.innerHTML = "Дохід за літні місяці = " + summer;
    </script>
</body>

</html>
