<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h3>Масив із 10 цілих чисел вводиться з клавіатури. Вивести на екран елементи з парним номером.</h3>
    <p id="arr_out"></p>

    <p id="result"></p>
    <script>
        let arr_out = document.getElementById("arr_out");
        let result = document.getElementById("result");
        let arr = [];
        let str_out = "<b>Досліджуваний масив:</b> ";
        for (let i = 0; i < 10; i += 1) {
            arr.push(Math.floor(Math.random() * 100));
            str_out += arr[i] + " "
        }
        console.log(arr);
        arr_out.innerHTML = str_out;

        let index_number = "Елементи з парним номером ";
        for (let i = 0; i < 10; i += 1) {
            if (i % 2 === 0) {
                index_number += arr[i] + " ";
            }
        }
        result.innerHTML = index_number;
    </script>
</body>

</html>
