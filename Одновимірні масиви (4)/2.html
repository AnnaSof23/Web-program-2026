<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h3>Масив із 10 цілих чисел заповнюється випадковими числами від 1 до 20. Знайти кількість елементів що кратні 3.
    </h3>
    <p id="arr_out"></p>

    <p id="result"></p>
    <script>
        let arr_out = document.getElementById("arr_out");
        let result = document.getElementById("result");
        let arr = [];
        let str_out = "<b>Досліджуваний масив:</b> ";
        for (let i = 0; i < 10; i += 1) {
            arr.push(Math.floor(Math.random() * 20) + 1);
            str_out += arr[i] + " "
        }
        console.log(arr);
        arr_out.innerHTML = str_out;

        let count = 0;
        for (let i = 0; i < 10; i += 1) {
            if (arr[i] % 3 == 0) {
                count += 1;
            }
        }
        str_out = "В дослджуваному масиві " + count + " елементів що кратні 3";
        result.innerHTML = str_out;
    </script>
</body>

</html>
