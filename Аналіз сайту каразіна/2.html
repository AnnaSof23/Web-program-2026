<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навчальні плани - Кафедра ЕК та ПЕ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

    <style>
        :root {
            --primary-blue: #1565c0;
            --dark-blue: #1a237e;
            --accent-yellow: #fbc02d;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f4f7f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            color: var(--text-dark);
        }

        h1 {
            margin-bottom: 10px;
            font-weight: 700;
        }

        .description {
            color: #7f8c8d;
            margin-bottom: 40px;
            text-align: center;
            max-width: 600px;
        }

        .container {
            display: flex;
            gap: 25px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Стилізація карток з Figma */
        .card {
            width: 260px;
            height: 180px;
            border-radius: 20px;
            padding: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        .cyber-bak {
            background: linear-gradient(135deg, #1e88e5, #1565c0);
        }

        .cyber-mag {
            background: linear-gradient(135deg, #1a237e, #283593);
        }

        .applied-mag {
            background: linear-gradient(135deg, #fdd835, #f9a825);
            color: #333;
        }

        .card h3 {
            margin: 0;
            font-size: 20px;
            line-height: 1.2;
            z-index: 2;
        }

        .card p {
            margin-top: 10px;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 13px;
            opacity: 0.9;
            z-index: 2;
        }

        .icon {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 30px;
            opacity: 0.3;
            z-index: 1;
        }

        /* Блок візуалізації */
        #visualization-area {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 40px;
            border-radius: 30px;
            display: none;
            /* З'являється після кліку */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Блок робочих планів (посилання) */
        .plans-box {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 2px dashed #edf2f7;
            text-align: center;
        }

        .plans-title {
            font-weight: 600;
            margin-bottom: 15px;
            color: #4a5568;
        }

        .download-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn-download {
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid #e2e8f0;
            color: #4a5568;
        }

        .btn-download:hover {
            background: #f7fafc;
            border-color: #cbd5e0;
            transform: scale(1.02);
        }

        canvas {
            max-width: 100%;
            height: auto !important;
        }
    </style>
</head>

<body>

    <h1>Навчальні плани</h1>
    <p class="description">Оберіть освітню програму, щоб побачити структуру дисциплін та завантажити детальні робочі
        плани на поточний рік.</p>

    <div class="container">
        <div class="card cyber-bak" onclick="updateDashboard('cyber_bak')">
            <span class="icon">🎓</span>
            <h3>Економічна кібернетика</h3>
            <p>бакалавр</p>
        </div>

        <div class="card cyber-mag" onclick="updateDashboard('cyber_mag')">
            <span class="icon">⚙️</span>
            <h3>Економічна кібернетика</h3>
            <p>магістр</p>
        </div>

        <div class="card applied-mag" onclick="updateDashboard('applied_mag')">
            <span class="icon">📊</span>
            <h3>Прикладна економіка</h3>
            <p>магістр</p>
        </div>
    </div>

    <div id="visualization-area">
        <canvas id="myChart"></canvas>

        <div class="plans-box">
            <div class="plans-title">📥 Офіційні робочі плани:</div>
            <div class="download-group">
                <a href="#" id="pdf-denna" class="btn-download">📄 Денна форма</a>
                <a href="#" id="pdf-zaochna" class="btn-download">📄 Заочна форма</a>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;
        Chart.register(ChartDataLabels);

        // Об'єднана база даних: графік + посилання на PDF
        const db = {
            'cyber_bak': {
                title: 'Економічна кібернетика (Бакалавр)',
                stats: [35, 25, 30, 10],
                subjects: 'Python, SQL, Теорія ймовірностей, Мікроекономіка',
                colors: ['#2196F3', '#0D47A1', '#64B5F6', '#BBDEFB'],
                links: { den: 'cyber_bak_denna.pdf', zao: 'cyber_bak_zaochna.pdf' }
            },
            'cyber_mag': {
                title: 'Економічна кібернетика (Магістр)',
                stats: [50, 15, 25, 10],
                subjects: 'Machine Learning, Big Data, Моделювання систем, Теорія ігор',
                colors: ['#1A237E', '#303F9F', '#3F51B5', '#C5CAE9'],
                links: { den: 'cyber_mag_denna.pdf', zao: 'cyber_mag_zaochna.pdf' }
            },
            'applied_mag': {
                title: 'Прикладна економіка (Магістр)',
                stats: [20, 10, 60, 10],
                subjects: 'Економетрика, Стратегічне управління, Прогнозування ринків',
                colors: ['#F9A825', '#FBC02D', '#FFEB3B', '#FFF9C4'],
                links: { den: 'applied_mag_denna.pdf', zao: 'applied_mag_zaochna.pdf' }
            }
        };

        function updateDashboard(id) {
            const area = document.getElementById('visualization-area');
            area.style.display = 'block';

            // 1. Оновлення посилань на файли
            document.getElementById('pdf-denna').href = db[id].links.den;
            document.getElementById('pdf-zaochna').href = db[id].links.zao;

            // 2. Робота з графіком
            const ctx = document.getElementById('myChart').getContext('2d');
            if (myChart) { myChart.destroy(); }

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['ІТ-блок', 'Математика', 'Економіка', 'Вибіркові'],
                    datasets: [{
                        data: db[id].stats,
                        backgroundColor: db[id].colors,
                        borderWidth: 3,
                        borderColor: '#ffffff',
                        hoverOffset: 20
                    }]
                },
                options: {
                    plugins: {
                        title: {
                            display: true,
                            text: db[id].title,
                            font: { size: 24, weight: 'bold' },
                            color: '#2c3e50',
                            padding: { bottom: 10 }
                        },
                        subtitle: {
                            display: true,
                            text: 'Ключові теми: ' + db[id].subjects,
                            font: { size: 15, style: 'italic' },
                            padding: { bottom: 30 }
                        },
                        datalabels: {
                            color: (context) => (id === 'applied_mag' ? '#4a5568' : '#ffffff'),
                            font: { weight: '700', size: 16 },
                            formatter: (val) => val + '%'
                        },
                        tooltip: {
                            callbacks: {
                                label: (item) => ` ${item.label}: ${item.raw}%`
                            }
                        }
                    },
                    cutout: '65%'
                }
            });

            // Плавний скрол до контенту
            setTimeout(() => {
                area.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }
    </script>
</body>

</html>
